<div class="p-4">
  <h2>Theme settings</h2>

  <mat-slide-toggle
    class="p-2"
    [checked]="taonTheme.isAuto()"
    (change)="taonTheme.toogleAuto($event.checked)">
    Sync colors with system
  </mat-slide-toggle>

  <mat-slide-toggle
    class="p-2"
    [checked]="taonTheme.isDark()"
    [disabled]="taonTheme.isAuto()"
    (change)="taonTheme.setDark($event.checked)">
    Dark mode
  </mat-slide-toggle>
</div>
