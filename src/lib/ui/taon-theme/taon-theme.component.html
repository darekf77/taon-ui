<div class="absolute top-2 right-2">
  <button
    mat-icon-button
    aria-label="Close dialog"
    (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
</div>
<div class="p-4">
  <h2>
    Theme settings
    {{ taonTheme.pernamentMode ? "( Settings can't ba changed )" : '' }}
  </h2>

  <mat-slide-toggle
    class="p-2"
    [checked]="taonTheme.isAuto()"
    [disabled]="taonTheme.pernamentMode"
    (change)="taonTheme.toogleAuto($event.checked)">
    Sync colors with system
  </mat-slide-toggle>

  <mat-slide-toggle
    class="p-2"
    [checked]="taonTheme.isDark()"
    [disabled]="taonTheme.isAuto() || taonTheme.pernamentMode"
    (change)="taonTheme.setDark($event.checked)">
    Dark mode
  </mat-slide-toggle>
</div>
