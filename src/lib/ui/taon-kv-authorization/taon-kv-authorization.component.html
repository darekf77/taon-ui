<div class="taon-kv-authorization">
  <div *ngIf="loading()">{{ infoMsg }}</div>

  <div *ngIf="!loading()">
    <div *ngIf="authorizedCount() === 0">You did not purchase any products</div>

    <div *ngIf="authorizedCount() > 0">
      <span translate> You purchased </span> {{ authorizedCount() }}
      <span translate> products</span>

      <span
        translate
        [translate-params]="{
          howMany: 1,
        }">
        You purchased [[ howMany ]] products</span
      >
    </div>
  </div>
</div>
