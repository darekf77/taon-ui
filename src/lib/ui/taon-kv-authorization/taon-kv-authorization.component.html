<div class="taon-kv-authorization">
  <div *ngIf="loading()">Loading authorization info...</div>

  <div *ngIf="!loading()">
    <div *ngIf="authorizedCount() === 0">You did not purchase any products</div>

    <div *ngIf="authorizedCount() > 0">
      You purchased {{ authorizedCount() }} products
    </div>
  </div>
</div>
