<form
  [formGroup]="form"
  content="notranslate"
  autocomplete="off"
  (click)="focus()"
  (ngSubmit)="submit(form.value)"
  class="flex flex-col items-center w-full h-full">
  <div class="flex content-center w-full justify-center mt-8">
    <p
      class="p-3 max-w-[400px] min-h-[100px]"
      [innerHtml]="safeMessage"></p>
  </div>

  <input
    type="password"
    class="text-5xl md:text-8xl pointer-events-none"
    #taonpasscode
    (keyup)="onKeyup($event)"
    formControlName="passcode" />
</form>
