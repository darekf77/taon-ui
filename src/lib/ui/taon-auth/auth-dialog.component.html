<div class="auth-dialog p-4">
  <h4 class="mb-3">Login or register</h4>

  <div
    class="w-full"
    #emailLoginBtn>
    <form
      [formGroup]="form"
      (ngSubmit)="loginByEmail()"
      class="w-full">
      <mat-form-field
        appearance="outline"
        class="w-full email-field">
        <mat-label *ngIf="!diableLoginByEmail">Email</mat-label>

        <input
          matInput
          formControlName="email"
          class="pl-1"
          type="email"
          [placeholder]="
            diableLoginByEmail ? 'Login by email (disabled)' : ''
          " />

        <button
          mat-icon-button
          [disabled]="diableLoginByEmail"
          matSuffix
          color="primary">
          <mat-icon>mail</mat-icon>
        </button>
        <mat-error *ngIf="form.get('email')?.hasError('email')">
          Please enter a valid email address
        </mat-error>
      </mat-form-field>
    </form>

    <div class="divider">
      <span>or</span>
    </div>

    <!-- GOOGLE BUTTON -->
    <div
      #googleBtn
      class="google-container">
      <span
        *ngIf="!googleButtonLoaded"
        class="text-300 p-2"
        >loading google button..</span
      >
      <mat-progress-bar
        *ngIf="!googleButtonLoaded"
        mode="indeterminate"
        class="auth-progress" />
    </div>

    <!-- MICROSOFT BUTTON -->
    <div
      *ngIf="microsoftClientId"
      #microsoftBtn
      class="microsoft-container">
      <button
        mat-stroked-button
        color="primary"
        class="w-full microsoft-btn"
        (click)="loginWithMicrosoft()">
        <mat-icon class="mr-2">login</mat-icon>
        Continue with Microsoft
      </button>
    </div>
  </div>

  <br />

  <div class="flex justify-content-end">
    <button
      mat-button
      mat-dialog-close>
      Cancel
    </button>
  </div>
</div>
